name: Build yq
on:
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  make_slackware_package:
    uses: bobbintb/Slackware_Packages/.github/workflows/sbopkg_template.yml@main
    secrets: inherit
    with:
      NAME: "yq"
      REPOS: alien-15.0
      PACKAGES: "alien-15.0:google-go-lang && echo 'PATH=$(ls -d /usr/lib64/go[0-9]*.[0-9]*.[0-9]* 2>/dev/null | sort -V | tail -n1)/bin:$PATH' >> $GITHUB_ENV && echo 'PATH=$PATH' >> $GITHUB_ENV"
