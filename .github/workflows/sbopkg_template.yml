name: sbopkg template
on:
  workflow_call:
    inputs:
      NAME:
        description: 'Program name'
        required: true
        type: string
      PACKAGES:
        description: 'Build dependencies to install, space seperated'
        required: false
        type: string
      REINSTALL:
        description: 'Build dependencies to re-install, space seperated'
        required: false
        type: string
      UPGRADE:
        description: 'Build dependencies to upgrade, space seperated'
        required: false
        type: string
      PIP:
        description: 'PIP dependencies to install, space seperated'
        required: false
        type: string
      REPOS:
        description: 'Additional repos to enable, space-separated (e.g. alien-15 conraid-current bobbintb)'
        required: false
        type: string
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: bobbintb/unraid-cicd-builder
      options: --privileged
    steps:
    - 
      name: Checkout
      uses: actions/checkout@v6
      with:
        clean: true
    -
      name: Import GPG key
      uses: crazy-max/ghaction-import-gpg@v7
      with:
        gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
        passphrase: ${{ secrets.PASSPHRASE }}
    - 
      name: Cache packages
      id: cache-packages
      uses: actions/cache@v5
      with:
        path: /var/cache/packages
        key: slackware-packages-${{ github.sha }}
        restore-keys: |
          slackware-packages-
    - 
      name: Enable additional repos
      if: ${{ inputs.REPOS != '' }}
      run: | 
        ./add_repos.sh ${{ inputs.REPOS }}
    - 
      name: Update slackpkg and fix glibc
      run: | 
        slackpkg update gpg
        slackpkg update
        slackpkg remove glibc
        slackpkg install glibc
    - 
      name: Install dependencies
      if: ${{ inputs.PACKAGES != '' }}
      run: | 
        slackpkg install ${{ inputs.PACKAGES }}
    - 
      name: Re-install dependencies
      if: ${{ inputs.REINSTALL != '' }}
      run: | 
        slackpkg reinstall ${{ inputs.REINSTALL }} || true
    - 
      name: Upgrade dependencies
      if: ${{ inputs.UPGRADE != '' }}
      run: | 
        slackpkg upgrade ${{ inputs.UPGRADE }} || true
    - 
      name: Build
      run: | 
        sbopkg -r
        /sbo-build.sh ${{ inputs.NAME }} <<< p

    - name: Download the existing site
      run: |
        mkdir -p /tmp/site-root/builds
        wget -r -np -nH --cut-dirs=2 -P /tmp/site-root/builds \
          --reject "index.html*" \
          https://bobbintb.github.io/Slackware_Packages/builds/ || true

    - name: Remove existing files from package subfolder
      run: |
        rm -rf /tmp/site-root/builds/${{ inputs.NAME }}
        mkdir -p /tmp/site-root/builds/${{ inputs.NAME }}

    - name: Move the package into its subfolder
      run: |
        # Using .t?z to catch .tgz or .txz
        find /tmp -name "${{ inputs.NAME }}-*.t?z" -exec cp {} /tmp/site-root/builds/${{ inputs.NAME }}/ \;

    - name: Run the gen_repos_files.sh file
      run: |
        slackpkg update gpg || true
        slackpkg update || true
        slackpkg install slackware64:pinentry slackware64:libsecret slackware64:gtk+2 slackware64:tcl slackware64:expect
        
        export REPOSOWNER="${{ github.repository_owner }}"
        export RSS_UUID=$(uuidgen -t)
        export REPOSROOT="/tmp/site-root/builds"
        
        cat <<EOF > /tmp/script.expect
        #!/usr/bin/expect
        set key [lindex \$argv 0]
        spawn /usr/libexec/slackrepo/gen_repos_files.sh
        expect "Enter ChangeLog.txt description:"
        send "\r"
        expect "Enter your GPG passphrase:"
        send "\$key\r"
        expect eof
        EOF

        chmod +x /usr/libexec/slackrepo/gen_repos_files.sh
        chmod +x /tmp/script.expect
        cd /tmp/site-root/builds
        /tmp/script.expect ${{ secrets.PASSPHRASE }}

    - name: Prepare Workspace for Upload
      run: |
        mkdir -p $GITHUB_WORKSPACE/deploy
        cp -a /tmp/site-root/. $GITHUB_WORKSPACE/deploy/

    - name: Generate directory listing
      uses: jayanta525/github-pages-directory-listing@v4.0.0
      with:
        FOLDER: deploy/builds

    - name: Generate directory listing (package)
      uses: jayanta525/github-pages-directory-listing@v4.0.0
      with:
        FOLDER: deploy/builds/${{ inputs.NAME }}

    - name: Upload pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy the page
        id: deployment
        uses: actions/deploy-pages@v4
