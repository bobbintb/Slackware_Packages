name: Build bpftool
on:
  workflow_dispatch:
    inputs:
      do_deploy:
        description: 'Deploy to GitHub Pages?'
        required: false
        type: boolean
        default: true
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  make_slackware_package:
    uses: bobbintb/Slackware_Packages/.github/workflows/sbopkg_template.yml@main
    secrets: inherit
    with:
      DEPLOY: ${{ inputs.do_deploy }}
      NAME: "bpftool"
      # PACKAGES: "openssl"
      # UPGRADE: "elfutils zlib openssl"
      # GIT: "https://github.com/libbpf/bpftool.git"
      BINARY_URL: "https://github.com/libbpf/bpftool/releases/download/v7.7.0/bpftool-v7.7.0-amd64.tar.gz"
