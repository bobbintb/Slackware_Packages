name: -Build dragonfly
on:
  workflow_dispatch:
    inputs:
      do_deploy:
        description: 'Deploy to GitHub Pages?'
        required: false
        type: boolean
        default: true
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  make_slackware_package:
    uses: bobbintb/Slackware_Packages/.github/workflows/sbopkg_template.yml@main
    secrets: inherit
    with:
      NAME: "dragonfly"
      PACKAGES: "ninja boost m4 gettext automake autoconf libtool re2"
