name: Build bpftrace
on:
  workflow_dispatch:
env:
  VERSION: "0.21.2"
  NAME: "bpftrace"
jobs:
  slackware-job:
    permissions: write-all
    runs-on: ubuntu-latest
    container:
      image: spaceinvaderone/auto_slack_pack
      options: --privileged
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Update and install packages
      run: |
        echo "================================= Updating packages ================================="
        CONF_FILE="/etc/slackpkg/slackpkg.conf"
        sed -i "s/^DIALOG=.*/DIALOG=off/" "$CONF_FILE"
        sed -i "s/^BATCH=.*/BATCH=on/" "$CONF_FILE"
        sed -i "s/^DEFAULT_ANSWER=.*/DEFAULT_ANSWER=y/" "$CONF_FILE"
        sed -i '$s/.*/https:\/\/mirrors\.slackware\.com\/slackware\/slackware64-15.0\//' /etc/slackpkg/mirrors
        slackpkg update <<< y
        # slackpkg upgrade-all
        slackpkg install llvm ccache vim asciidoctor libedit libssh2 ruby
        # wget https://slackware.uk/slackware/slackware64-current/slackware64/d/luajit-2.1.1732813678-x86_64-1.txz
        wget https://slackers.it/repository/slackware64-current/libbpf/libbpf-1.4.6-x86_64-1cf.txz
        wget https://github.com/bobbintb/Slackware_Packages/raw/refs/heads/main/bcc/bcc-0.32.0-x86_64-1_SBo.tgz
        wget https://slackware.uk/people/alien/sbrepos/current/x86_64/cereal/cereal-1.3.0-x86_64-1alien.txz
        wget https://slackware.uk/slackware/slackware64-current/slackware64/d/pahole-1.28-x86_64-1.txz
        wget https://ftp.sotirov-bg.net/pub/contrib/slackware/packages/slackware64-15.0/gtest-1.11.0-x86_64-2gds.txz
        installpkg *.txz
        rm *.txz
        installpkg *.tgz
        rm *.tgz
        wget https://slackware.uk/slackware/slackware64-current/slackware64/d/binutils-2.43.1-x86_64-1.txz
        wget https://slackware.uk/slackware/slackware64-current/slackware64/d/cmake-3.31.2-x86_64-1.txz
        upgradepkg *.txz
        rm *.txz
    - name: Build
      run: |
        echo "================================= Downloading source code ================================="
        REPO=${GITHUB_REPOSITORY##*/}
        REPO_DIR="/__w/${REPO}/${REPO}"
        mkdir -p ${REPO_DIR}/${NAME}
        cd ./SlackBuilds/$NAME
        wget https://github.com/iovisor/bpftrace/archive/refs/tags/v0.21.2/bpftrace-0.21.2.tar.gz
        sh ${REPO_DIR}/SlackBuilds/${NAME}/${NAME}.SlackBuild
        # installpkg *.tgz
        # rm *.tgz
        # sbopkg -r -q
        # sbopkg -b ${NAME} <<< p
        find / -name *.tgz
        git config --global --add safe.directory $REPO_DIR
        cp /tmp/*.tgz ${REPO_DIR}/${NAME}
    - name: Commit changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: 'updated ${{ env.NAME }}'
        file_pattern: '*.tgz'
