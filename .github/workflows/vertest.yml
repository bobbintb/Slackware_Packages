name: test template
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: bobbintb/unraid-cicd-builder
      options: --privileged
    steps:
    - 
      name: Checkout
      uses: actions/checkout@v6
      with:
        clean: true
    -
      name: Import GPG key
      uses: crazy-max/ghaction-import-gpg@v7
      with:
        gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
        passphrase: ${{ secrets.PASSPHRASE }}
    - 
      name: Cache packages
      id: cache-packages
      uses: actions/cache@v5
      with:
        path: /var/cache/packages
        key: slackware-packages-${{ github.sha }}
        restore-keys: |
          slackware-packages-
    - 
      name: test
      run: | 
        pwd
        cp /__w/Slackware_Packages/Slackware_Packages/SlackBuilds/bpftool /var/lib/sbopkg/SBo/15.0/development/bpftool
        #find / -name *.SlackBuild
        ls /var/lib/sbopkg/SBo/15.0/development/bpftool
